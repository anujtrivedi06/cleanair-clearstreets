<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CleanAir &amp; Clear Streets — Delhi NCR</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>CleanAir &amp; Clear Streets</h1>
    <p>Live pollution hotspots &amp; 24h spike forecast — Delhi NCR</p>
  </header>

  <main>
    <aside id="zones-panel">
      <div id="tiles-column">
        <div class="panel-header">
          <h2>Zones</h2>
          <span class="panel-subtitle">Ranked by AQI, high to low</span>
        </div>

        <div id="zone-tiles">
          <div class="placeholder-tile">Loading hotspot data…</div>
        </div>
      </div>

      <div id="report-section">
        <button type="button" id="report-toggle" class="report-toggle">
          <span class="toggle-icon">+</span>
          <span>Report a pollution source</span>
        </button>
        <div id="report-body" class="report-body">
          <form id="submit-form">
            <label>Photo
              <input type="file" id="photo-input" accept="image/*" capture="environment" required />
            </label>
            <label>Location
              <select id="zone-select"></select>
            </label>
            <button type="submit">Classify &amp; submit</button>
          </form>
          <div id="classification-result"></div>
        </div>
      </div>
    </aside>

    <section id="map"></section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/map.js"></script>
  <script type="module" src="js/submit.js"></script>
</body>
</html>
