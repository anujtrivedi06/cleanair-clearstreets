name: Update hotspot data

on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours -- adjust for demo needs
  workflow_dispatch: {}       # manual trigger button, e.g. right before a live demo

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Write Firebase service account key
        run: echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}" | base64 -d > firebase-service-account.json

      - name: Run pipeline
        working-directory: scripts
        env:
          DATA_GOV_IN_API_KEY: ${{ secrets.DATA_GOV_IN_API_KEY }}
          CPCB_RESOURCE_ID: ${{ secrets.CPCB_RESOURCE_ID }}
          FIRMS_MAP_KEY: ${{ secrets.FIRMS_MAP_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT_PATH: ${{ github.workspace }}/firebase-service-account.json
        run: python run_pipeline.py

      - name: Remove Firebase service account key
        if: always()
        run: rm -f firebase-service-account.json

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data/hotspots.json data/processed
          git diff --cached --quiet || git commit -m "Update hotspot data [automated]"
          git pull --rebase origin main
          git push
